<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Bum</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div id="app">
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            <!-- Menu button -->
            <button id="menuButton" class="menu-button">☰</button>
            <!-- Debug panel -->
            <div id="debugPanel" class="debug-panel">
                <div class="debug-panel-header">
                    <span class="debug-panel-title">Debug</span>
                    <label class="debug-panel-toggle">
                        <input id="debugPanelToggle" type="checkbox">
                        <span>Debug Panel</span>
                    </label>
                </div>
                <div id="debugPanelBody" class="debug-panel-body">
                    <div class="debug-row">
                        <label for="treeDensitySlider">Tree Density</label>
                        <input id="treeDensitySlider" type="range" min="0.3" max="2.0" step="0.05" value="1.0">
                        <span id="treeDensityValue" class="debug-value">1.00x</span>
                    </div>
                </div>
            </div>
            <!-- Retry button -->
            <button id="retryButton" class="retry-button" style="display: none;">Retry</button>
            <!-- Menu overlay -->
            <div id="menuOverlay" class="menu-overlay" style="display: none;">
                <div class="menu-panel">
                    <button id="menuCloseButton" class="menu-close-button">×</button>
                    <h2>Controls</h2>
                    <div class="controls-list">
                        <div class="control-item">
                            <span class="key">←</span>
                            <span class="action">
                                <div>Move Left</div>
                                <div class="hint">Double-press: Aggressive Turn</div>
                            </span>
                        </div>
                        <div class="control-item">
                            <span class="key">→</span>
                            <span class="action">
                                <div>Move Right</div>
                                <div class="hint">Double-press: Aggressive Turn</div>
                            </span>
                        </div>
                        <div class="control-item">
                            <span class="key">↓</span>
                            <span class="action">
                                <div>Speed Boost</div>
                                <div class="hint">Double-press: 2x Speed</div>
                            </span>
                        </div>
                        <div class="control-item">
                            <span class="key">↑</span>
                            <span class="action">Stop</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
